name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          # Используем плагин compose, который уже есть на ubuntu-latest в GitHub Actions
          docker compose build
          docker compose push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            # Переходим в папку проекта (создай её заранее, если нет)
            mkdir -p ~/projects/node-micro-practice
            cd ~/projects/node-micro-practice

            # Если папка пустая - клонируем, если нет - подтягиваем изменения
            if [ ! -d ".git" ]; then
              git clone https://github.com/timaZhuk/NodeJS-microservises-deploy-Test-CICD.git .
            else
              git pull origin main
            fi

            # Авторизуемся в Docker, чтобы стянуть новые приватные образы
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Экспортируем секреты в переменные окружения сессии
            export MONGO_URI="${{ secrets.MONGO_URI }}"
            export JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}"
            export RABBITMQ_URL="${{ secrets.RABBITMQ_URL }}" 
            export REDIS_URL="${{ secrets.REDIS_URL }}"
            export NODE_ENV="${{ secrets.NODE_ENV }}" 

            export API_GATEWAY_PORT="${{ secrets.API_GATEWAY_PORT }}" 
            export IDENTITY_SERVICE_URL="${{ secrets.IDENTITY_SERVICE_URL }}" 
            export IDENTITY_SERVICE_PORT="${{ secrets.IDENTITY_SERVICE_PORT }}" 

            export POST_SERVICE_URL="${{ secrets.POST_SERVICE_URL }}" 
            export POST_SERVICE_PORT="${{ secrets.POST_SERVICE_PORT }}" 

            export MEDIA_SERVICE_URL="${{ secrets.MEDIA_SERVICE_URL }}"
            export MEDIA_SERVICE_PORT="${{ secrets.MEDIA_SERVICE_PORT }}"

            export SEARCH_SERVICE_URL="${{ secrets.SEARCH_SERVICE_URL }}"
            export SEARCH_SERVICE_PORT="${{ secrets.SEARCH_SERVICE_PORT }}"

            export CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}"
            export CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"
            export CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}"







            # Перезапуск сервисов
            docker compose pull
            docker compose down
            docker compose up -d

            # Очистка старых ненужных образов (чтобы t3.micro не забился)
            docker image prune -f
